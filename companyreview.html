<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어둠의 회사리뷰 - 솔직한 회사 이야기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #232220;
    --border: #2e2c2a;
    --accent: #e8c84a;
    --accent2: #e87a4a;
    --text: #f0ede8;
    --text2: #a09890;
    --text3: #6a6460;
    --good: #4ae87a;
    --bad: #e84a4a;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,14,13,0.95);
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }
  .header-btns { display: flex; gap: 10px; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    border: none;
    color: #0f0e0d;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #f0d060; }

  /* ─── HERO ─── */
  .hero {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 40px;
  }
  .hero h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
  .search-bar {
    display: flex;
    gap: 10px;
    max-width: 560px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text3); }
  .search-bar button {
    background: var(--accent);
    border: none;
    color: #0f0e0d;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .search-bar button:hover { background: #f0d060; }

  /* ─── STATS BAR ─── */
  .stats-bar {
    max-width: 1100px;
    margin: 0 auto 32px;
    padding: 0 24px;
    display: flex;
    gap: 24px;
  }
  .stat-item { color: var(--text3); font-size: 13px; }
  .stat-item strong { color: var(--accent); font-size: 15px; }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ─── COMPANY CARDS ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 700;
  }
  .company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .company-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .company-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .company-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .company-card:hover::before { opacity: 1; }
  .company-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .company-industry {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 14px;
  }
  .rating-big {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 12px;
  }
  .rating-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
  }
  .rating-stars { color: var(--accent); font-size: 14px; }
  .rating-count { color: var(--text3); font-size: 12px; }
  .company-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text3);
  }
  .company-meta span { display: flex; align-items: center; gap: 4px; }

  /* ─── EMPTY / LOADING ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--text3); }

  /* ─── MODAL OVERLAY ─── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    backdrop-filter: blur(4px);
    overflow-y: auto;
    padding: 24px;
  }
  .overlay.active { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 600px;
    margin: auto;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 0 24px 24px; }

  /* ─── FORM STYLES ─── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .form-label .req { color: var(--accent2); margin-left: 3px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
  .form-select option { background: var(--surface2); }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* ─── STAR RATING INPUT ─── */
  .star-rating-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .star-item label {
    font-size: 12px;
    color: var(--text3);
    display: block;
    margin-bottom: 6px;
  }
  .star-input {
    display: flex;
    gap: 4px;
  }
  .star-input button {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.15s;
    padding: 0;
    line-height: 1;
  }
  .star-input button.active { color: var(--accent); }
  .star-input button:hover { color: var(--accent); }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── COMPANY DETAIL ─── */
  .detail-modal { max-width: 760px; }
  .detail-header {
    padding: 28px 28px 0;
    margin-bottom: 0;
  }
  .detail-company-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .detail-industry { color: var(--text3); font-size: 13px; margin-bottom: 20px; }
  .detail-ratings {
    display: flex;
    gap: 24px;
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .detail-rating-main { display: flex; align-items: baseline; gap: 8px; }
  .detail-rating-big {
    font-family: 'Noto Serif KR', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .detail-rating-sub { display: flex; flex-direction: column; gap: 2px; }
  .detail-stars { color: var(--accent); font-size: 16px; }
  .detail-count { color: var(--text3); font-size: 12px; }
  .detail-body { padding: 0 28px 28px; }

  /* ─── REVIEW CARDS ─── */
  .review-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }
  .review-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .review-rating { color: var(--accent); font-size: 13px; }
  .review-date { color: var(--text3); font-size: 12px; }
  .review-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--text3);
    border: 1px solid var(--border);
  }
  .review-scores {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .review-score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .review-score-label { font-size: 10px; color: var(--text3); }
  .review-score-val { font-size: 13px; font-weight: 700; color: var(--accent); }
  .review-section { margin-bottom: 10px; }
  .review-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .review-section p { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ─── INTERVIEW CARDS ─── */
  .interview-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }
  .badge-pass { background: rgba(74,232,122,0.15); color: var(--good); }
  .badge-fail { background: rgba(232,74,74,0.15); color: var(--bad); }
  .badge-pending { background: rgba(160,152,144,0.15); color: var(--text3); }
  .badge-easy { background: rgba(74,232,122,0.1); color: var(--good); }
  .badge-normal { background: rgba(232,196,74,0.1); color: var(--accent); }
  .badge-hard { background: rgba(232,74,74,0.1); color: var(--bad); }

  /* ─── WRITE BUTTON ─── */
  .write-btns {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    justify-content: flex-end;
  }

  /* ─── AD BANNER ─── */
  .ad-banner {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-bottom: 32px;
    color: var(--text3);
    font-size: 12px;
  }
  .ad-banner-top {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    margin-bottom: 24px;
    color: var(--text3);
    font-size: 12px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ─── DIVIDER ─── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 640px) {
    .company-grid { grid-template-columns: 1fr; }
    .star-rating-group { grid-template-columns: 1fr; }
    .detail-ratings { gap: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="showHome()">어둠의<span>회사리뷰</span></div>
    <div class="header-btns">
      <button class="btn-outline" onclick="openWriteReview()">후기 쓰기</button>
      <button class="btn-primary" onclick="openWriteInterview()">면접 후기</button>
    </div>
  </div>
</header>

<!-- AD TOP -->
<div style="max-width:1100px;margin:16px auto 0;padding:0 24px;">
  <div class="ad-banner-top">📢 광고 영역 (Google AdSense)</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>아무도 말 못했던<br><em>어둠의 회사 이야기</em></h1>
  <p>현직자·전직자·면접자가 익명으로 전하는 솔직한 회사 후기. 누구나 자유롭게 열람할 수 있습니다.</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="회사명으로 검색..." onkeydown="if(event.key==='Enter')searchCompany()">
    <button onclick="searchCompany()">검색</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item">등록 회사 <strong id="statCompanies">-</strong>개</div>
  <div class="stat-item">회사 후기 <strong id="statReviews">-</strong>개</div>
  <div class="stat-item">면접 후기 <strong id="statInterviews">-</strong>개</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="ad-banner">📢 광고 영역 (Google AdSense 320x50)</div>

  <div class="section-header">
    <div class="section-title" id="sectionTitle">최근 등록된 회사</div>
  </div>

  <div id="companyGrid" class="company-grid">
    <div class="loading">불러오는 중...</div>
  </div>

  <div class="ad-banner">📢 광고 영역 (Google AdSense 728x90)</div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: COMPANY DETAIL
═══════════════════════════════════════ -->
<div class="overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="modal detail-modal" onclick="event.stopPropagation()">
    <div class="modal-header detail-header">
      <div>
        <div class="detail-company-name" id="detailName">-</div>
        <div class="detail-industry" id="detailIndustry">-</div>
      </div>
      <button class="modal-close" onclick="closeOverlay('detailOverlay')">✕</button>
    </div>

    <div class="detail-ratings">
      <div class="detail-rating-main">
        <div class="detail-rating-big" id="detailRating">-</div>
        <div class="detail-rating-sub">
          <div class="detail-stars" id="detailStars">-</div>
          <div class="detail-count" id="detailCount">후기 -개</div>
        </div>
      </div>
    </div>

    <div class="detail-body">
      <div class="write-btns">
        <button class="btn-outline" onclick="openWriteReviewForCompany()">회사 후기 작성</button>
        <button class="btn-primary" onclick="openWriteInterviewForCompany()">면접 후기 작성</button>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('reviews')">회사 후기 <span id="reviewTabCount"></span></div>
        <div class="tab" onclick="switchTab('interviews')">면접 후기 <span id="interviewTabCount"></span></div>
      </div>

      <div id="reviewsPanel"></div>
      <div id="interviewsPanel" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: WRITE REVIEW
═══════════════════════════════════════ -->
<div class="overlay" id="reviewOverlay" onclick="closeDetail(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">회사 후기 작성</div>
      <button class="modal-close" onclick="closeOverlay('reviewOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">회사명<span class="req">*</span></label>
        <input type="text" class="form-input" id="rv_company" placeholder="회사명을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">업종</label>
        <input type="text" class="form-input" id="rv_industry" placeholder="예: IT/소프트웨어, 제조업, 금융...">
      </div>
      <div class="form-group">
        <label class="form-label">재직 상태<span class="req">*</span></label>
        <select class="form-select" id="rv_status">
          <option value="">선택하세요</option>
          <option value="현직">현직</option>
          <option value="전직">전직</option>
          <option value="인턴">인턴</option>
        </select>
      </div>

      <div class="form-label" style="margin-bottom:12px;">항목별 평가<span class="req">*</span></div>
      <div class="star-rating-group">
        <div class="star-item">
          <label>종합 평점</label>
          <div class="star-input" id="star_overall" data-key="overall"></div>
        </div>
        <div class="star-item">
          <label>급여/복지</label>
          <div class="star-input" id="star_salary" data-key="salary"></div>
        </div>
        <div class="star-item">
          <label>워라밸</label>
          <div class="star-input" id="star_worklife" data-key="worklife"></div>
        </div>
        <div class="star-item">
          <label>사내문화</label>
          <div class="star-input" id="star_culture" data-key="culture"></div>
        </div>
        <div class="star-item">
          <label>경영진</label>
          <div class="star-input" id="star_management" data-key="management"></div>
        </div>
        <div class="star-item">
          <label>승진/성장</label>
          <div class="star-input" id="star_growth" data-key="growth"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">장점<span class="req">*</span></label>
        <textarea class="form-textarea" id="rv_pros" placeholder="이 회사의 장점을 솔직하게 적어주세요"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">단점<span class="req">*</span></label>
        <textarea class="form-textarea" id="rv_cons" placeholder="이 회사의 단점을 솔직하게 적어주세요"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">한줄평<span class="req">*</span></label>
        <input type="text" class="form-input" id="rv_summary" placeholder="이 회사를 한 줄로 표현한다면?">
      </div>

      <button class="btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="submitReview()">익명으로 후기 등록</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: WRITE INTERVIEW
═══════════════════════════════════════ -->
<div class="overlay" id="interviewOverlay" onclick="closeDetail(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">면접 후기 작성</div>
      <button class="modal-close" onclick="closeOverlay('interviewOverlay')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">회사명<span class="req">*</span></label>
        <input type="text" class="form-input" id="iv_company" placeholder="회사명을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">업종</label>
        <input type="text" class="form-input" id="iv_industry" placeholder="예: IT/소프트웨어, 제조업, 금융...">
      </div>
      <div class="form-group">
        <label class="form-label">면접 결과<span class="req">*</span></label>
        <select class="form-select" id="iv_result">
          <option value="">선택하세요</option>
          <option value="합격">합격</option>
          <option value="불합격">불합격</option>
          <option value="미정">미정</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">면접 난이도<span class="req">*</span></label>
        <select class="form-select" id="iv_difficulty">
          <option value="">선택하세요</option>
          <option value="쉬움">쉬움</option>
          <option value="보통">보통</option>
          <option value="어려움">어려움</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">면접 방식<span class="req">*</span></label>
        <select class="form-select" id="iv_method">
          <option value="">선택하세요</option>
          <option value="대면">대면</option>
          <option value="화상">화상</option>
          <option value="전화">전화</option>
          <option value="복합">복합</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">면접 과정</label>
        <textarea class="form-textarea" id="iv_process" placeholder="서류 → 1차 면접 → 2차 면접 순서 등을 적어주세요"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">면접 질문</label>
        <textarea class="form-textarea" id="iv_questions" placeholder="기억에 남는 면접 질문을 적어주세요"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">후기<span class="req">*</span></label>
        <textarea class="form-textarea" id="iv_review" placeholder="전반적인 면접 경험을 솔직하게 적어주세요"></textarea>
      </div>

      <button class="btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="submitInterview()">익명으로 면접 후기 등록</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7TAojgYFMlGDFomwKqo3KSU4lZ6ZkKScNr8BGOI1ucqgCpMlQQt2D2QIX_4-6pTit/exec';

let allCompanies = [];
let currentCompany = null;
let starValues = { overall: 0, salary: 0, worklife: 0, culture: 0, management: 0, growth: 0 };

// ─── INIT ───
window.onload = () => {
  initStars();
  loadCompanies();
};

async function loadCompanies() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getCompanies`);
    const data = await res.json();
    allCompanies = data || [];
    renderCompanies(allCompanies);
    updateStats();
  } catch(e) {
    document.getElementById('companyGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>데이터를 불러오지 못했습니다</p></div>';
  }
}

function updateStats() {
  document.getElementById('statCompanies').textContent = allCompanies.length;
  const totalReviews = allCompanies.reduce((s, c) => s + (parseInt(c.reviewCount) || 0), 0);
  const totalInterviews = allCompanies.reduce((s, c) => s + (parseInt(c.interviewCount) || 0), 0);
  document.getElementById('statReviews').textContent = totalReviews;
  document.getElementById('statInterviews').textContent = totalInterviews;
}

function renderCompanies(list) {
  const grid = document.getElementById('companyGrid');
  if (!list || list.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>아직 등록된 회사가 없어요.<br>첫 번째 후기를 작성해보세요!</p></div>';
    return;
  }
  grid.innerHTML = list.map(c => {
    const rating = parseFloat(c.avgRating) || 0;
    const stars = ratingToStars(rating);
    return `
      <div class="company-card" onclick="openDetail('${c.id}')">
        <div class="company-name">${escHtml(c.name)}</div>
        <div class="company-industry">${escHtml(c.industry || '업종 미지정')}</div>
        <div class="rating-big">
          <div class="rating-num">${rating > 0 ? rating.toFixed(1) : '-'}</div>
          <div class="rating-stars">${stars}</div>
        </div>
        <div class="company-meta">
          <span>📝 후기 ${c.reviewCount || 0}개</span>
          <span>🎤 면접 ${c.interviewCount || 0}개</span>
        </div>
      </div>
    `;
  }).join('');
}

function searchCompany() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) {
    document.getElementById('sectionTitle').textContent = '최근 등록된 회사';
    renderCompanies(allCompanies);
    return;
  }
  const filtered = allCompanies.filter(c => c.name.toLowerCase().includes(q));
  document.getElementById('sectionTitle').textContent = `"${q}" 검색 결과 ${filtered.length}개`;
  renderCompanies(filtered);
}

function showHome() {
  document.getElementById('searchInput').value = '';
  document.getElementById('sectionTitle').textContent = '최근 등록된 회사';
  renderCompanies(allCompanies);
}

// ─── DETAIL ───
async function openDetail(companyId) {
  currentCompany = allCompanies.find(c => c.id === companyId);
  if (!currentCompany) return;

  document.getElementById('detailName').textContent = currentCompany.name;
  document.getElementById('detailIndustry').textContent = currentCompany.industry || '업종 미지정';
  const rating = parseFloat(currentCompany.avgRating) || 0;
  document.getElementById('detailRating').textContent = rating > 0 ? rating.toFixed(1) : '-';
  document.getElementById('detailStars').textContent = ratingToStars(rating);
  document.getElementById('detailCount').textContent = `후기 ${currentCompany.reviewCount || 0}개`;

  document.getElementById('reviewsPanel').innerHTML = '<div class="loading">불러오는 중...</div>';
  document.getElementById('interviewsPanel').innerHTML = '<div class="loading">불러오는 중...</div>';

  document.getElementById('detailOverlay').classList.add('active');
  switchTab('reviews');

  try {
    const [reviews, interviews] = await Promise.all([
      fetch(`${SCRIPT_URL}?action=getReviews&companyId=${companyId}`).then(r => r.json()),
      fetch(`${SCRIPT_URL}?action=getInterviews&companyId=${companyId}`).then(r => r.json())
    ]);
    renderReviews(reviews || []);
    renderInterviews(interviews || []);
    document.getElementById('reviewTabCount').textContent = reviews.length ? `(${reviews.length})` : '';
    document.getElementById('interviewTabCount').textContent = interviews.length ? `(${interviews.length})` : '';
  } catch(e) {
    document.getElementById('reviewsPanel').innerHTML = '<div class="empty-state"><p>불러오지 못했습니다</p></div>';
  }
}

function renderReviews(reviews) {
  if (!reviews.length) {
    document.getElementById('reviewsPanel').innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>아직 후기가 없어요</p></div>';
    return;
  }
  document.getElementById('reviewsPanel').innerHTML = reviews.map(r => `
    <div class="review-card">
      <div class="review-meta">
        <span class="review-rating">${ratingToStars(r.overall)} ${parseFloat(r.overall).toFixed(1)}</span>
        <span class="review-status">${r.employmentStatus || '익명'}</span>
        <span class="review-date">${r.date}</span>
      </div>
      <div class="review-scores">
        ${scoreItem('급여', r.salary)}${scoreItem('워라밸', r.worklife)}${scoreItem('문화', r.culture)}${scoreItem('경영진', r.management)}${scoreItem('성장', r.growth)}
      </div>
      ${r.summary ? `<div class="review-section"><div class="review-section-title">한줄평</div><p>"${escHtml(r.summary)}"</p></div>` : ''}
      ${r.pros ? `<div class="review-section"><div class="review-section-title">👍 장점</div><p>${escHtml(r.pros)}</p></div>` : ''}
      ${r.cons ? `<div class="review-section"><div class="review-section-title">👎 단점</div><p>${escHtml(r.cons)}</p></div>` : ''}
    </div>
  `).join('');
}

function scoreItem(label, val) {
  return `<div class="review-score-item"><div class="review-score-label">${label}</div><div class="review-score-val">${val || '-'}</div></div>`;
}

function renderInterviews(interviews) {
  if (!interviews.length) {
    document.getElementById('interviewsPanel').innerHTML = '<div class="empty-state"><div class="icon">🎤</div><p>아직 면접 후기가 없어요</p></div>';
    return;
  }
  document.getElementById('interviewsPanel').innerHTML = interviews.map(iv => {
    const resultClass = iv.result === '합격' ? 'badge-pass' : iv.result === '불합격' ? 'badge-fail' : 'badge-pending';
    const diffClass = iv.difficulty === '쉬움' ? 'badge-easy' : iv.difficulty === '어려움' ? 'badge-hard' : 'badge-normal';
    return `
      <div class="review-card">
        <div class="review-meta">
          <span class="interview-badge ${resultClass}">${iv.result || '-'}</span>
          <span class="interview-badge ${diffClass}">${iv.difficulty || '-'}</span>
          <span class="review-status">${iv.method || '-'}</span>
          <span class="review-date">${iv.date}</span>
        </div>
        ${iv.process ? `<div class="review-section"><div class="review-section-title">면접 과정</div><p>${escHtml(iv.process)}</p></div>` : ''}
        ${iv.questions ? `<div class="review-section"><div class="review-section-title">면접 질문</div><p>${escHtml(iv.questions)}</p></div>` : ''}
        ${iv.review ? `<div class="review-section"><div class="review-section-title">후기</div><p>${escHtml(iv.review)}</p></div>` : ''}
      </div>
    `;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab === 'reviews' ? 0 : 1].classList.add('active');
  document.getElementById('reviewsPanel').style.display = tab === 'reviews' ? 'block' : 'none';
  document.getElementById('interviewsPanel').style.display = tab === 'interviews' ? 'block' : 'none';
}

// ─── SUBMIT REVIEW ───
async function submitReview() {
  const company = document.getElementById('rv_company').value.trim();
  const status = document.getElementById('rv_status').value;
  const pros = document.getElementById('rv_pros').value.trim();
  const cons = document.getElementById('rv_cons').value.trim();
  const summary = document.getElementById('rv_summary').value.trim();

  if (!company || !status || !pros || !cons || !summary) return showToast('필수 항목을 모두 입력해주세요');
  if (!starValues.overall) return showToast('종합 평점을 선택해주세요');

  // 회사 찾기 or 생성
  let companyId = findOrCreateCompanyId(company, document.getElementById('rv_industry').value.trim());

  const params = new URLSearchParams({
    action: 'addReview',
    companyId, companyName: company,
    overall: starValues.overall, salary: starValues.salary || 0,
    worklife: starValues.worklife || 0, culture: starValues.culture || 0,
    management: starValues.management || 0, growth: starValues.growth || 0,
    pros, cons, summary, employmentStatus: status
  });

  try {
    await fetch(`${SCRIPT_URL}?${params}`);
    showToast('후기가 등록되었습니다! 🎉');
    closeOverlay('reviewOverlay');
    resetReviewForm();
    setTimeout(loadCompanies, 1500);
  } catch(e) {
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
  }
}

async function submitInterview() {
  const company = document.getElementById('iv_company').value.trim();
  const result = document.getElementById('iv_result').value;
  const difficulty = document.getElementById('iv_difficulty').value;
  const method = document.getElementById('iv_method').value;
  const review = document.getElementById('iv_review').value.trim();

  if (!company || !result || !difficulty || !method || !review) return showToast('필수 항목을 모두 입력해주세요');

  let companyId = findOrCreateCompanyId(company, document.getElementById('iv_industry').value.trim());

  const params = new URLSearchParams({
    action: 'addInterview',
    companyId, companyName: company,
    difficulty, result, method,
    process: document.getElementById('iv_process').value.trim(),
    questions: document.getElementById('iv_questions').value.trim(),
    review
  });

  try {
    await fetch(`${SCRIPT_URL}?${params}`);
    showToast('면접 후기가 등록되었습니다! 🎉');
    closeOverlay('interviewOverlay');
    resetInterviewForm();
    setTimeout(loadCompanies, 1500);
  } catch(e) {
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
  }
}

function findOrCreateCompanyId(name, industry) {
  const found = allCompanies.find(c => c.name.toLowerCase() === name.toLowerCase());
  if (found) return found.id;
  // 없으면 addCompany 호출 후 임시 ID
  const tempId = 'tmp_' + Date.now();
  fetch(`${SCRIPT_URL}?action=addCompany&name=${encodeURIComponent(name)}&industry=${encodeURIComponent(industry)}`);
  return tempId;
}

// ─── OPEN MODALS ───
function openWriteReview() {
  document.getElementById('rv_company').value = '';
  document.getElementById('reviewOverlay').classList.add('active');
}
function openWriteReviewForCompany() {
  if (currentCompany) document.getElementById('rv_company').value = currentCompany.name;
  document.getElementById('reviewOverlay').classList.add('active');
}
function openWriteInterview() {
  document.getElementById('iv_company').value = '';
  document.getElementById('interviewOverlay').classList.add('active');
}
function openWriteInterviewForCompany() {
  if (currentCompany) document.getElementById('iv_company').value = currentCompany.name;
  document.getElementById('interviewOverlay').classList.add('active');
}

// ─── OVERLAYS ───
function closeOverlay(id) {
  document.getElementById(id).classList.remove('active');
}
function closeDetail(e) {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
}

// ─── STAR INPUTS ───
function initStars() {
  ['overall','salary','worklife','culture','management','growth'].forEach(key => {
    const container = document.getElementById('star_' + key);
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.textContent = '★';
      btn.type = 'button';
      btn.dataset.val = i;
      btn.onclick = () => setStar(key, i);
      container.appendChild(btn);
    }
  });
}
function setStar(key, val) {
  starValues[key] = val;
  const btns = document.querySelectorAll(`#star_${key} button`);
  btns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.val) <= val));
}

function resetReviewForm() {
  ['rv_company','rv_industry','rv_pros','rv_cons','rv_summary'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('rv_status').value = '';
  Object.keys(starValues).forEach(k => {
    starValues[k] = 0;
    document.querySelectorAll(`#star_${k} button`).forEach(b => b.classList.remove('active'));
  });
}
function resetInterviewForm() {
  ['iv_company','iv_industry','iv_process','iv_questions','iv_review'].forEach(id => document.getElementById(id).value = '');
  ['iv_result','iv_difficulty','iv_method'].forEach(id => document.getElementById(id).value = '');
}

// ─── HELPERS ───
function ratingToStars(r) {
  const n = Math.round(parseFloat(r) || 0);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
